# ============================================================
# DATA RETENTION in InfluxDB
# ============================================================
# By default the "homeassistant" bucket keeps data forever.
# To set a retention policy:
#   InfluxDB UI → Buckets → homeassistant → Settings
#   Set "Delete Data" to e.g. 365 days (1 year)
#
# Unlike HA's recorder, InfluxDB stores every individual reading
# (one per wake cycle ≈ every 5 min), not just hourly summaries.
# For 3 rooms × 7 sensors × 365 days × 288 readings/day ≈ ~2.2M rows/year
# which is ~50–100 MB — perfectly fine on a Raspberry Pi.
