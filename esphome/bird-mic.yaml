# ESPHome Configuration — Bird Microphone Node
# Based on: https://github.com/Sukecz/birdnetgo-esp32-rtsp-mic
#
# Hardware: Generic ESP32-WROOM / ESP32-DevKit + ICS-43434 I2S MEMS microphone
#   Wiring:
#     ICS-43434 BCLK  → GPIO26
#     ICS-43434 WS    → GPIO25
#     ICS-43434 DOUT  → GPIO34  (input-only pin, perfect for mic data)
#     ICS-43434 VDD   → 3V3
#     ICS-43434 GND   → GND
#     ICS-43434 L/R   → GND  (selects left channel)
#
# Audio is delivered to BirdNET-Go via two paths:
#   1. voice_assistant → HA native API   (HA dashboard / Assist pipeline)
#   2. rtp_sender → RTSP ANNOUNCE → mediamtx:8554/bird → BirdNET-Go (RTSP)
#      The custom component in components/rtp_sender/ handles the RTSP publish.
# See: bird-mic-howto.md for the full setup guide.

esphome:
  name: bird-mic
  friendly_name: Bird Microphone

# Local custom component — source files live in esphome/components/rtp_sender/
external_components:
  - source:
      type: local
      path: components
    components: [rtp_sender]

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    version: recommended

# WiFi connectivity
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback AP if WiFi connection fails
  ap:
    ssid: "ESPHome-BirdMic-Fallback"
    password: "esphome123"

captive_portal:

# Native Home Assistant API
api:
  encryption:
    key: !secret api_key

# Over-the-air firmware updates
ota:
  - platform: esphome
    password: !secret ota_password

# Logging
logger:
  level: INFO

# ─── I2S Audio ───────────────────────────────────────────────────────────────
# ICS-43434: standard I2S (not PDM), 24-bit in 32-bit frame, up to 48 kHz
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO25   # WS / LRCLK
    i2s_bclk_pin: GPIO26    # BCLK

microphone:
  - platform: i2s_audio
    id: bird_microphone
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO34     # SD / DOUT (input-only GPIO)
    adc_type: external
    pdm: false
    channel: left           # L/R pin tied to GND → left channel
    bits_per_sample: 32bit
    sample_rate: 48000

# ─── Voice Assistant ──────────────────────────────────────────────────────────
# Streams audio to HA's Assist pipeline. HA can forward to BirdNET-Go add-on.
# Adjust volume_multiplier to change gain (original project uses 1.2x).
voice_assistant:
  microphone: bird_microphone
  id: va
  noise_suppression_level: 0   # No suppression — we want raw environment audio
  auto_gain: 0dBFS
  volume_multiplier: 1.2       # 1.2x gain, matching original project default

  on_error:
    - logger.log:
        level: WARN
        format: "Voice assistant error: %s"
        args: [message.c_str()]

# ─── RTP sender → mediamtx → BirdNET-Go ─────────────────────────────────────
# Publishes audio to mediamtx via RTSP ANNOUNCE so BirdNET-Go can subscribe
# to rtsp://mediamtx:8554/bird from within the Docker network.
# mediamtx_host must be the LAN IP of the Docker host (not 'localhost').
rtp_sender:
  microphone_id: bird_microphone
  host: !secret mediamtx_host   # LAN IP of the Docker host, e.g. 192.168.1.10
  port: 8554                     # mediamtx RTSP port
  path: /bird                    # stream path — must match mediamtx.yml
  sample_rate: 48000             # ICS-43434 native rate, expected by BirdNET-Go

# ─── Sensors ─────────────────────────────────────────────────────────────────
sensor:
  # Internal MCU temperature — thermal protection equivalent
  # Original project shuts down at 80 °C (configurable 30–95 °C)
  - platform: internal_temperature
    name: "Bird Mic MCU Temperature"
    id: mcu_temp
    update_interval: 30s

  # WiFi signal strength monitoring (original project tracks this)
  - platform: wifi_signal
    name: "Bird Mic WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  # Uptime
  - platform: uptime
    name: "Bird Mic Uptime"

binary_sensor:
  - platform: status
    name: "Bird Mic Status"

# ─── Thermal protection ───────────────────────────────────────────────────────
# Mirror original project: stop audio stream when MCU temperature exceeds 80 °C
interval:
  - interval: 15s
    then:
      - if:
          condition:
            sensor.in_range:
              id: mcu_temp
              above: 80.0
          then:
            - logger.log:
                level: WARN
                format: "MCU temp %.1f°C exceeds 80°C — stopping voice assistant"
                args: [id(mcu_temp).state]
            - voice_assistant.stop:

# ─── Buttons ─────────────────────────────────────────────────────────────────
button:
  - platform: restart
    name: "Bird Mic Restart"

  # Manually start/stop audio streaming from HA dashboard
  - platform: template
    name: "Bird Mic Start Streaming"
    on_press:
      - voice_assistant.start_continuous:

  - platform: template
    name: "Bird Mic Stop Streaming"
    on_press:
      - voice_assistant.stop:
