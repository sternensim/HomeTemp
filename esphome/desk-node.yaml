# ESPHome Configuration — Desk Node
# Hardware: ESP32 + HLK-LD2410C mmWave presence sensor
# Purpose: Detect desk occupancy and control desk light via HA smart plug
#
# Wiring:
#   LD2410C VCC → 5V (sensor requires 5V)
#   LD2410C GND → GND
#   LD2410C TX  → ESP32 GPIO16 (UART2 RX)
#   LD2410C RX  → ESP32 GPIO17 (UART2 TX)
#
# HA Automation (add in Home Assistant):
#   Trigger:  binary_sensor.desk_desk_presence  ON  → turn on smart plug
#   Trigger:  binary_sensor.desk_desk_presence  OFF (for 60s) → turn off smart plug
#   (60s delay prevents the light turning off when you briefly look away)

esphome:
  name: desk
  friendly_name: Desk Node

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "ESPHome-Desk-Fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# UART for LD2410C (256000 baud, 8N1)
uart:
  id: uart_ld2410
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 256000
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: [0xF8, 0xF7, 0xF6, 0xF5]

# LD2410C mmWave presence sensor
ld2410:
  uart_id: uart_ld2410

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Desk Presence Raw"
      id: desk_presence_raw
      internal: true        # hidden — use the filtered sensor below in your automation
    has_moving_target:
      name: "Desk Moving Target"
      id: desk_moving
      entity_category: diagnostic
    has_still_target:
      name: "Desk Still Target"
      id: desk_still
      entity_category: diagnostic

  # Filtered occupancy: moving target OR (still target with energy above threshold)
  # Raise still_energy threshold if the chair/desk is still triggering false positives
  - platform: template
    name: "Desk Presence"
    id: desk_presence
    device_class: occupancy
    lambda: |-
      return id(desk_moving_energy).state > id(moving_energy_threshold).state ||
             (id(desk_still).state && id(desk_still_energy).state > id(still_energy_threshold).state);

sensor:
  # Distance and energy readings for tuning detection zones
  - platform: ld2410
    moving_distance:
      name: "Desk Moving Distance"
      entity_category: diagnostic
    still_distance:
      name: "Desk Still Distance"
      entity_category: diagnostic
    moving_energy:
      name: "Desk Moving Energy"
      id: desk_moving_energy
      entity_category: diagnostic
    still_energy:
      name: "Desk Still Energy"
      id: desk_still_energy
      entity_category: diagnostic
    detection_distance:
      name: "Desk Detection Distance"
      entity_category: diagnostic

  - platform: wifi_signal
    name: "Desk Node WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Desk Node Uptime"
    entity_category: diagnostic

# Expose LD2410C config knobs to HA so you can tune without reflashing
number:
  - platform: ld2410
    timeout:
      name: "Desk Presence Timeout"
    max_move_distance_gate:
      name: "Desk Max Move Distance"
    max_still_distance_gate:
      name: "Desk Max Still Distance"
    g0_move_threshold:
      name: "Desk Gate 0 Move Threshold"
      entity_category: config
    g1_move_threshold:
      name: "Desk Gate 1 Move Threshold"
      entity_category: config
    g2_move_threshold:
      name: "Desk Gate 2 Move Threshold"
      entity_category: config
    g3_move_threshold:
      name: "Desk Gate 3 Move Threshold"
      entity_category: config
    g4_move_threshold:
      name: "Desk Gate 4 Move Threshold"
      entity_category: config
    g5_move_threshold:
      name: "Desk Gate 5 Move Threshold"
      entity_category: config
    g6_move_threshold:
      name: "Desk Gate 6 Move Threshold"
      entity_category: config
    g7_move_threshold:
      name: "Desk Gate 7 Move Threshold"
      entity_category: config
    g8_move_threshold:
      name: "Desk Gate 8 Move Threshold"
      entity_category: config
    g0_still_threshold:
      name: "Desk Gate 0 Still Threshold"
      entity_category: config
    g1_still_threshold:
      name: "Desk Gate 1 Still Threshold"
      entity_category: config
    g2_still_threshold:
      name: "Desk Gate 2 Still Threshold"
      entity_category: config
    g3_still_threshold:
      name: "Desk Gate 3 Still Threshold"
      entity_category: config
    g4_still_threshold:
      name: "Desk Gate 4 Still Threshold"
      entity_category: config
    g5_still_threshold:
      name: "Desk Gate 5 Still Threshold"
      entity_category: config
    g6_still_threshold:
      name: "Desk Gate 6 Still Threshold"
      entity_category: config
    g7_still_threshold:
      name: "Desk Gate 7 Still Threshold"
      entity_category: config
    g8_still_threshold:
      name: "Desk Gate 8 Still Threshold"
      entity_category: config

  - platform: template
    name: "Desk Moving Energy Min"
    id: moving_energy_threshold
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 90
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    name: "Desk Still Energy Min"
    id: still_energy_threshold
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 70
    restore_value: true
    optimistic: true
    entity_category: config

button:
  - platform: restart
    name: "Desk Node Restart"
    entity_category: diagnostic
  - platform: ld2410
    factory_reset:
      name: "LD2410C Factory Reset"
      entity_category: diagnostic
    restart:
      name: "LD2410C Restart"
      entity_category: diagnostic
    query_parameters:
      name: "LD2410C Get Config"
      entity_category: diagnostic

select:
  - platform: ld2410
    distance_resolution:
      name: "Desk Distance Resolution"
      entity_category: config
    baud_rate:
      name: "LD2410C Baud Rate"
      entity_category: config

text_sensor:
  - platform: ld2410
    version:
      name: "LD2410C Firmware Version"
      entity_category: diagnostic
