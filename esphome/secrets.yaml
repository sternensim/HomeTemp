# ESPHome Secrets File
# IMPORTANT: Keep this file SECRET! Never commit to public repositories.
# Replace with your actual values before deploying.

wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# Generate a random API encryption key with:
# python3 -c "import secrets; print(secrets.token_hex(16))"
api_key: "00000000000000000000000000000000"

# Generate OTA password (any string, but use a strong one):
ota_password: "your_secure_ota_password_here"

# Home Assistant API encryption key (optional, for added security):
ha_api_key: "00000000000000000000000000000000"
