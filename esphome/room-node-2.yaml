# ESPHome Configuration — Room Node 2 (Bathroom)
# Hardware: ESP32 + BME680 + SSD1306 OLED
# Update interval: 5 minutes (sleep 5min, awake 30s for WiFi + sensors)

esphome:
  name: bathroom
  friendly_name: Bathroom
  on_boot:
    priority: 800
    then:
      - lambda: 'id(oled_display).turn_on();'
      - delay: 100ms
  on_shutdown:
    then:
      - lambda: 'id(oled_display).turn_off();'
      - delay: 100ms

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi connectivity
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback AP if WiFi connection fails
  ap:
    ssid: "ESPHome-Bathroom-Fallback"
    password: "esphome123"

captive_portal:

# Native Home Assistant API
api:
  encryption:
    key: !secret api_key

# Over-the-air firmware updates
ota:
  - platform: esphome
    password: !secret ota_password

# Logging
logger:
  level: INFO

# I2C bus for BME680 + OLED (GPIO21=SDA, GPIO22=SCL)
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

# BME680 environmental sensor
bme680_bsec:
  address: 0x77
  temperature_offset: 2.0
  iaq_mode: static
  state_save_interval: 6h
  supply_voltage: 3.3V

# Sensor definitions
sensor:
  - platform: bme680_bsec
    temperature:
      name: "Bathroom Temperature"
      id: temp
      accuracy_decimals: 1
      filters:
        - offset: 0.0
    pressure:
      name: "Bathroom Pressure"
      id: press
      accuracy_decimals: 1
    humidity:
      name: "Bathroom Humidity"
      id: humid
      accuracy_decimals: 1
    gas_resistance:
      name: "Bathroom Gas Resistance"
      id: gas_res
    iaq:
      name: "Bathroom IAQ Score"
      id: iaq
      accuracy_decimals: 0
    co2_equivalent:
      name: "Bathroom CO2 Equivalent"
      id: co2_eq
      accuracy_decimals: 1
    breath_voc_equivalent:
      name: "Bathroom VOC Equivalent"
      id: voc_eq
      accuracy_decimals: 1

  # WiFi signal strength
  - platform: wifi_signal
    name: "Bathroom Node WiFi Signal"
    update_interval: 60s

  # Uptime tracker
  - platform: uptime
    name: "Bathroom Node Uptime"

# Text sensor for IAQ classification
text_sensor:
  - platform: bme680_bsec
    iaq_accuracy:
      name: "Bathroom IAQ Accuracy"

# OLED display (SSD1306, 128x64 pixels)
# bpp: 1 — SSD1306 is monochrome, bpp:4 causes render errors
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
    bpp: 1
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
    bpp: 1
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
    bpp: 1

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 0
    update_interval: 5s
    brightness: 100%
    lambda: |-
      // Title
      it.printf(0, 0, id(font_medium), "Bathroom");

      // Temperature and Humidity on one line
      it.printf(0, 20, id(font_small), "%.1f°C  %.0f%%", id(temp).state, id(humid).state);

      // Pressure
      it.printf(0, 34, id(font_small), "P: %.0f hPa", id(press).state);

      // IAQ Score with text label
      int iaq_val = (int)id(iaq).state;
      const char *iaq_label;
      if (iaq_val < 50) {
        iaq_label = "Good";
      } else if (iaq_val < 100) {
        iaq_label = "OK";
      } else if (iaq_val < 200) {
        iaq_label = "Bad";
      } else {
        iaq_label = "Poor";
      }
      it.printf(0, 48, id(font_small), "IAQ: %.0f %s", id(iaq).state, iaq_label);

# Deep sleep configuration
# 30s awake (WiFi connect + sensor read + OLED update)
# 5min sleep between readings
# deep_sleep:              # PATCHED OUT FOR DEBUGGING
#   run_duration: 30s
#   sleep_duration: 5min
#   id: deep_sleep_control

# Button to prevent sleep (useful for debugging)
button:
  - platform: restart
    name: "Bathroom Node Restart"
  # - platform: template      # PATCHED OUT FOR DEBUGGING (deep_sleep disabled)
  #   name: "Bathroom Node Force Wake"
  #   on_press:
  #     - deep_sleep.prevent: deep_sleep_control

# Status LED — GPIO16 is safe; GPIO2 is a strapping pin
status_led:
  pin:
    number: GPIO16
    inverted: false
