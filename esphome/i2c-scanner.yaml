# ESPHome Configuration — I2C Scanner
# Scans the I2C bus every 30s and reports active addresses to Home Assistant.
# Change SDA/SCL pins to match your wiring (defaults: GPIO21/GPIO22 for ESP32).

esphome:
  name: i2c-scanner
  friendly_name: I2C Scanner
  on_boot:
    priority: 200
    then:
      - script.execute: do_scan

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "i2c-scanner-fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG   # DEBUG so raw scan hits serial too

# ── I2C bus ──────────────────────────────────────────────────────────────────
i2c:
  id: i2c_bus
  sda: GPIO21
  scl: GPIO22
  scan: false        # we handle scanning ourselves; set true to also get boot log
  frequency: 100kHz  # slow = more reliable detection of unknown devices

# ── Results exposed to Home Assistant ────────────────────────────────────────
text_sensor:
  - platform: template
    name: "I2C Active Addresses"
    id: i2c_found
    icon: "mdi:magnify"

sensor:
  - platform: template
    name: "I2C Device Count"
    id: i2c_count
    accuracy_decimals: 0
    icon: "mdi:counter"
    update_interval: never

# ── Scan logic ────────────────────────────────────────────────────────────────
script:
  - id: do_scan
    then:
      - lambda: |-
          std::string found = "";
          int count = 0;
          ESP_LOGI("i2c_scan", "Scanning I2C bus (0x01 – 0x7F)...");
          for (uint8_t addr = 0x01; addr < 0x80; addr++) {
            // probe: write 0 bytes — ACK means device present
            auto err = i2c_bus->write(addr, nullptr, 0, true);
            if (err == i2c::ERROR_OK) {
              if (!found.empty()) found += ", ";
              char buf[7];
              snprintf(buf, sizeof(buf), "0x%02X", addr);
              found += buf;
              count++;
              ESP_LOGI("i2c_scan", "  Found device at %s", buf);
            }
          }
          if (found.empty()) {
            found = "None";
            ESP_LOGW("i2c_scan", "  No I2C devices found.");
          } else {
            ESP_LOGI("i2c_scan", "  Total: %d device(s)", count);
          }
          id(i2c_found).publish_state(found);
          id(i2c_count).publish_state((float)count);

# ── Periodic rescan every 30 s ────────────────────────────────────────────────
interval:
  - interval: 30s
    then:
      - script.execute: do_scan

# ── Manual scan button (callable from HA dashboard) ──────────────────────────
button:
  - platform: restart
    name: "I2C Scanner Restart"
  - platform: template
    name: "I2C Scan Now"
    icon: "mdi:refresh"
    on_press:
      - script.execute: do_scan
