# ESPHome Configuration — Soil Moisture Monitor
# Hardware: ESP32 + Hygrometer Module V1.2 (resistive, LM393 comparator)
#
# Wiring (per sensor):
#   VCC  → 3.3V
#   GND  → GND
#   AOUT → ADC1 pin (GPIO32 / GPIO33 / GPIO34 / GPIO35 for sensors 1–4)
#   DOUT → not used (digital threshold, less useful than raw analog)
#
# ⚠  ADC2 pins (GPIO0/2/4/12–15/25–27) conflict with WiFi — do NOT use them.
#    Stick to ADC1: GPIO32, GPIO33, GPIO34, GPIO35, GPIO36, GPIO39
#
# Calibration:
#   The raw voltage depends on your soil and sensor quality — calibrate:
#   1. Put sensor in DRY air  → note the voltage reading in ESPHome logs → set as 0%
#   2. Put sensor in WATER    → note the voltage reading                 → set as 100%
#   Typical resistive V1.2 values: ~3.3V dry, ~1.0–1.5V wet
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TO ADD MORE SENSORS — duplicate the block marked ▶ DUPLICATE ◀ below:
#   Step 1 — Wire new sensor AOUT to a different ADC1 pin (GPIO33, GPIO34 …)
#   Step 2 — Copy the sensor block
#   Step 3 — Change: pin, name, id (all three must be unique per sensor)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

esphome:
  name: soil-moisture
  friendly_name: Soil Moisture Monitor

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi connectivity
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "ESPHome-Moisture-Fallback"
    password: "esphome123"

captive_portal:

# Native Home Assistant API
api:
  encryption:
    key: !secret api_key

# Over-the-air firmware updates
ota:
  - platform: esphome
    password: !secret ota_password

# Logging
logger:
  level: INFO

sensor:

  # ┌─────────────────────────────────────────────────────────────────────┐
  # │  ▶ DUPLICATE THIS BLOCK for each additional sensor                 │
  # │    Change: pin / name / id                                          │
  # └─────────────────────────────────────────────────────────────────────┘
  - platform: adc
    pin: GPIO32              # ← Sensor 1 AOUT wire
    name: "Plant 1 Soil Moisture"
    id: moisture_1           # ← unique id (moisture_2, moisture_3 …)
    unit_of_measurement: "%"
    device_class: moisture
    state_class: measurement
    update_interval: 30s
    attenuation: 11db        # extends range to ~0–3.9V (needed for 3.3V sensors)
    filters:
      - calibrate_linear:
          # ← Adjust these two voltages after measuring your sensor:
          - 3.30 -> 0.0    # sensor in dry air  → 0% moisture
          - 1.10 -> 100.0  # sensor in water    → 100% moisture
      - clamp:
          min_value: 0
          max_value: 100
    accuracy_decimals: 0
  # └─────────────────────────────────────────────────────────────────────┘

  # Sensor 2 — uncomment and wire AOUT to GPIO33
  # - platform: adc
  #   pin: GPIO33
  #   name: "Plant 2 Soil Moisture"
  #   id: moisture_2
  #   unit_of_measurement: "%"
  #   device_class: moisture
  #   state_class: measurement
  #   update_interval: 30s
  #   attenuation: 11db
  #   filters:
  #     - calibrate_linear:
  #         - 3.30 -> 0.0
  #         - 1.10 -> 100.0
  #     - clamp:
  #         min_value: 0
  #         max_value: 100
  #   accuracy_decimals: 0

  # Sensor 3 — uncomment and wire AOUT to GPIO34
  # - platform: adc
  #   pin: GPIO34
  #   name: "Plant 3 Soil Moisture"
  #   id: moisture_3
  #   unit_of_measurement: "%"
  #   device_class: moisture
  #   state_class: measurement
  #   update_interval: 30s
  #   attenuation: 11db
  #   filters:
  #     - calibrate_linear:
  #         - 3.30 -> 0.0
  #         - 1.10 -> 100.0
  #     - clamp:
  #         min_value: 0
  #         max_value: 100
  #   accuracy_decimals: 0

  # Node health
  - platform: wifi_signal
    name: "Moisture Node WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Moisture Node Uptime"

button:
  - platform: restart
    name: "Moisture Node Restart"

# Status LED (GPIO16 — safe, not a strapping pin)
status_led:
  pin:
    number: GPIO16
    inverted: false

# ── Deep sleep (optional — enable if running on battery) ─────────────────
# Same 30s-awake / 5min-sleep pattern as the room nodes.
# Remove or comment this block if the node is mains-powered.
