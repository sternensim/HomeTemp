# ESPHome Configuration — Central Display Station
# Hardware: TENSTAR ESP32-2432S028R ("Cheap Yellow Display" / CYD)
#   MCU:       ESP32-WROOM-32
#   Display:   ILI9342  320×240 TFT (native landscape), SPI (HSPI bus)
#   Touch:     XPT2046  resistive, separate SPI bus
#   Backlight: GPIO21 (PWM via LEDC, active HIGH)
#   RGB LED:   R=GPIO4, G=GPIO16, B=GPIO17 (active-LOW)
#
# Wiring (fixed on board):
#   Display SPI:  CLK=GPIO14  MOSI=GPIO13  MISO=GPIO12
#                 CS=GPIO15   DC=GPIO2     BL=GPIO21
#   Touch SPI:    CLK=GPIO25  MOSI=GPIO32  MISO=GPIO39
#                 CS=GPIO33   IRQ=GPIO36
#
# ⚠ GPIO12/GPIO15/GPIO2 are strapping pins — ESPHome warnings are expected and safe.
#   These are fixed PCB traces on the CYD board, not external resistors.
#
# Entity IDs — verify in HA → Developer Tools → States before flashing.

# ── Core ────────────────────────────────────────────────────────────────────

esphome:
  name: display-station
  friendly_name: Display Station

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Connectivity ─────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Display-Station-AP"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - lvgl.widget.hide: lbl_hastatus

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ── SPI buses ─────────────────────────────────────────────────────────────────
# CYD uses two independent SPI buses — display and touch cannot be shared.

spi:
  - id: display_spi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# ── Backlight ─────────────────────────────────────────────────────────────────

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ── ILI9342 display ───────────────────────────────────────────────────────────
# ILI9342 is natively 320×240 landscape — no rotation needed.
# TPM408-2.8 panels use ILI9342, not ILI9341.

display:
  - platform: ili9xxx
    model: ILI9342
    id: my_display
    spi_id: display_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    rotation: 0
    dimensions:
      width: 320
      height: 240
    update_interval: never   # LVGL owns all redraws
    invert_colors: false     # correct for ILI9341; change to true if colors look negative

# ── XPT2046 resistive touch ───────────────────────────────────────────────────
# Calibration: enable DEBUG logging, press all four corners, note raw x/y values.

touchscreen:
  - platform: xpt2046
    id: my_touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3900
      y_min: 200
      y_max: 3900
    transform:
      swap_xy: true   # required when display is rotated 90°
      mirror_y: true  # fix: touch Y axis was inverted


font:
  - file: "gfonts://Roboto Mono"
    id: clock_font
    size: 16

  # Material Design Icons — large weather icons
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_weather
    size: 80
    glyphs:
      - "\U000F0599"  # weather-sunny
      - "\U000F0594"  # weather-night          (clear-night)
      - "\U000F0595"  # weather-partly-cloudy
      - "\U000F0F33"  # weather-night-partly-cloudy
      - "\U000F0590"  # weather-cloudy
      - "\U000F0596"  # weather-rainy
      - "\U000F067E"  # weather-pouring
      - "\U000F0593"  # weather-lightning
      - "\U000F067F"  # weather-lightning-rainy
      - "\U000F0597"  # weather-snowy
      - "\U000F0F31"  # weather-snowy-rainy
      - "\U000F0591"  # weather-fog
      - "\U000F0592"  # weather-hail
      - "\U000F059D"  # weather-windy
      - "\U000F059E"  # weather-windy-variant

  # Material Design Icons — small arrows for high/low temperature
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_arrow
    size: 20
    glyphs:
      - "\U000F005D"  # arrow-up-thick
      - "\U000F0045"  # arrow-down-thick


# ── Home Assistant sensors ────────────────────────────────────────────────────



time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: "Europe/Berlin"
    on_time:
      - seconds: /1
        then:
          - lambda: |-
              auto now = id(homeassistant_time).now();
              if (!now.is_valid()) return;

              static char timebuf[16];
              static char datebuf[24];

              now.strftime(timebuf, sizeof(timebuf), "%H:%M");
              now.strftime(datebuf, sizeof(datebuf), "%d.%m.%Y");

              lv_label_set_text(id(time_label), timebuf);
              lv_label_set_text(id(date_label), datebuf);

              // Tomorrow's date for forecast page
              static char tomorrowbuf[16];
              time_t t_tomorrow = now.timestamp + 86400;
              struct tm lt_tomorrow;
              localtime_r(&t_tomorrow, &lt_tomorrow);
              strftime(tomorrowbuf, sizeof(tomorrowbuf), "%d.%m.%Y", &lt_tomorrow);
              lv_label_set_text(id(lbl_tomorrow_date), tomorrowbuf);


sensor:

  # Weather Data Wind Speed
  - platform: homeassistant
    id: weather_data_wspeed
    entity_id: weather.forecast_home
    attribute: wind_speed
    on_value:
      - lvgl.label.update:
          id: lbl_weather_data_wspeed
          text: !lambda 'return str_sprintf("%.1fkm/h", x);'
  # Weahter Data Wind direction
  - platform: homeassistant
    id: weather_data_wdirection
    entity_id: weather.forecast_home
    attribute: wind_bearing
    on_value:
      - lvgl.label.update:
          id: lbl_weather_data_wdirection
          text: !lambda
            'static const char *dirs[] = {
              "N","NNE","NE","ENE",
              "E","ESE","SE","SSE",
              "S","SSW","SW","WSW",
              "W","WNW","NW","NNW"
            };

            float deg = id(weather_data_wdirection).state;
            int index = int((deg + 11.25) / 22.5) % 16;
            return {dirs[index]};'

  # Weather Data Temp
  - platform: homeassistant
    id: weather_data_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - if:
          condition:
            lambda: 'return isnan(id(simon_temp_out).state);'
          then:
            - lvgl.label.update:
                id: lbl_sim_temp_out
                text: !lambda |-
                  if (isnan(x)) return std::string("--.-°");
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%.1f°", x);
                  return std::string(buf);

  # Temperature outside simons Fenster
  - platform: homeassistant
    id: simon_temp_out
    entity_id: sensor.simon_schreibtisch_node_simon_schreibtisch_probe_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_sim_temp_out
          text: !lambda |-
            float v = x;
            if (isnan(v)) v = id(weather_data_temp).state;
            if (isnan(v)) return std::string("--.-°");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f°", v);
            return std::string(buf);

  # Leas Ecke
  - platform: homeassistant
    id: lea_temp
    entity_id: sensor.lea_schreibtisch_node_lea_schreibtisch_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_lea_temp
          text: !lambda 'return str_sprintf("%.0f°", x);'

  - platform: homeassistant
    id: lea_humid
    entity_id: sensor.lea_schreibtisch_node_lea_schreibtisch_humidity
    on_value:
      - lvgl.label.update:
          id: lbl_lea_humid
          text: !lambda 'return str_sprintf("%.0f%%", x);'

  # Simons Ecke
  - platform: homeassistant
    id: sim_temp
    entity_id: sensor.simon_schreibtisch_node_simon_schreibtisch_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_sim_temp
          text: !lambda 'return str_sprintf("%.0f°", x);'

  - platform: homeassistant
    id: sim_humid
    entity_id: sensor.simon_schreibtisch_node_simon_schreibtisch_humidity
    on_value:
      - lvgl.label.update:
          id: lbl_sim_humid
          text: !lambda 'return str_sprintf("%.0f%%", x);'

  # # Office
  # - platform: homeassistant
  #   id: of_temp
  #   entity_id: sensor.room_node_3_office_temperature
  #   on_value:
  #     - lvgl.label.update:
  #         id: lbl_of_temp
  #         text: !lambda 'return str_sprintf("%.1f°", x);'

  # - platform: homeassistant
  #   id: of_humid
  #   entity_id: sensor.room_node_3_office_humidity
  #   on_value:
  #     - lvgl.label.update:
  #         id: lbl_of_humid
  #         text: !lambda 'return str_sprintf("%.0f%%", x);'

  # - platform: homeassistant
  #   id: of_iaq
  #   entity_id: sensor.room_node_3_office_iaq_score
  #   on_value:
  #     - lvgl.label.update:
  #         id: lbl_of_iaq
  #         text: !lambda 'return str_sprintf("IAQ %.0f", x);'

  # ── Tomorrow's forecast ──────────────────────────────────────────────────────
  - platform: homeassistant
    id: tomorrow_high
    entity_id: sensor.tomorrow_temp_high
    on_value:
      - lvgl.label.update:
          id: lbl_tomorrow_high
          text: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f°", x);
            return std::string(buf);

  - platform: homeassistant
    id: tomorrow_low
    entity_id: sensor.tomorrow_temp_low
    on_value:
      - lvgl.label.update:
          id: lbl_tomorrow_low
          text: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f°", x);
            return std::string(buf);

  - platform: homeassistant
    id: tomorrow_precip
    entity_id: sensor.tomorrow_precipitation
    on_value:
      - lvgl.label.update:
          id: lbl_tomorrow_precip
          text: !lambda 'return str_sprintf("%.1fmm", x);'

  - platform: homeassistant
    id: tomorrow_wind
    entity_id: sensor.tomorrow_wind_speed
    on_value:
      - lvgl.label.update:
          id: lbl_tomorrow_wind
          text: !lambda 'return str_sprintf("%.0fkm/h", x);'

  - platform: homeassistant
    id: tomorrow_wind_bearing
    entity_id: sensor.tomorrow_wind_bearing
    on_value:
      - lvgl.label.update:
          id: lbl_weather_data_wdirection
          text: !lambda
            'static const char *dirs[] = {
              "N","NNE","NE","ENE",
              "E","ESE","SE","SSE",
              "S","SSW","SW","WSW",
              "W","WNW","NW","NNW"
            };

            float deg = id(lbl_tomorrow_wind_dir).state;
            int index = int((deg + 11.25) / 22.5) % 16;
            return {dirs[index]};'

  # Station health
  - platform: wifi_signal
    name: "Display Station WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Display Station Uptime"
    update_interval: 60s

text_sensor:
  - platform: homeassistant
    id: tomorrow_condition
    entity_id: sensor.tomorrow_condition
    on_value:
      - lambda: |-
          const char* icon = "\U000F0590";  // fallback: cloudy
          const char* text = "Wolkig";

          if      (x == "sunny")             { icon = "\U000F0599"; text = "Sonnig"; }
          else if (x == "clear-night")       { icon = "\U000F0594"; text = "Klar"; }
          else if (x == "partlycloudy")      { icon = "\U000F0595"; text = "Teils wolkig"; }
          else if (x == "night-partlycloudy"){ icon = "\U000F0F33"; text = "Teils wolkig"; }
          else if (x == "cloudy")            { icon = "\U000F0590"; text = "Wolkig"; }
          else if (x == "rainy")             { icon = "\U000F0596"; text = "Regen"; }
          else if (x == "pouring")           { icon = "\U000F067E"; text = "Starkregen"; }
          else if (x == "lightning")         { icon = "\U000F0593"; text = "Gewitter"; }
          else if (x == "lightning-rainy")   { icon = "\U000F067F"; text = "Gewitter+Regen"; }
          else if (x == "snowy")             { icon = "\U000F0597"; text = "Schnee"; }
          else if (x == "snowy-rainy")       { icon = "\U000F0F31"; text = "Schneeregen"; }
          else if (x == "fog")               { icon = "\U000F0591"; text = "Nebel"; }
          else if (x == "hail")              { icon = "\U000F0592"; text = "Hagel"; }
          else if (x == "windy")             { icon = "\U000F059D"; text = "Windig"; }
          else if (x == "windy-variant")     { icon = "\U000F059E"; text = "Boeig"; }

          lv_label_set_text(id(lbl_tomorrow_icon), icon);
          lv_label_set_text(id(lbl_tomorrow_cond), text);

button:
  - platform: restart
    name: "Display Station Restart"

# ── LVGL UI ───────────────────────────────────────────────────────────────────
#
# Screen: 320×240 landscape (display rotation: 90 — ILI9341 driver handles orientation)
#
#  ┌──────────────────────────────────────────┐  y=0
#  │        Home Environment Monitor          │  h=30  header
#  ├────────────┬──────────────┬──────────────┤  y=30
#  │ Leas Ecke  │   24.5°      │    45%       │  h=66
#  ├────────────┼──────────────┼──────────────┤  y=98
#  │ Simons Eck │   22.1°      │    52%       │  h=66
#  ├────────────┼──────────────┼──────┬───────┤  y=166
#  │ Office     │   23.8°      │  48% │ IAQ62 │  h=60
#  ├──────────────────────────────────────────┤  y=228
#  │           [HA connection status]         │  h=12  footer
#  └──────────────────────────────────────────┘  y=240
#
#  Column x positions:
#    Room label : x=5,  w=83
#    Temperature: x=88, w=110  (Office: w=90)
#    Humidity   : x=198, w=82  (Office: x=178, w=80)
#    IAQ        : x=258, w=62  (Office only)
# test

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touch
  default_font: montserrat_14

  pages:
    - id: page_main
      bg_color: 0x0d1b2a
      pad_all: 0

      widgets:
    
        # ── Header ───────────────────────────────────────────────────────────
        - label:     
            text: "\uF1EB"
            id: lbl_hastatus
            hidden: true
            align: top_right
            x: -2
            y: 7
            text_align: right
            text_color: 0xFFFFFF
        - label:
            id: time_label
            text: "--:--"
            align: top_mid
            text_color: 0xFFFFFF
            width: 83
        - label:
            id: date_label
            text: "--.--.----"
            align: top_left
            text_color: 0xFFFFFF
            width: 83
            
          # -label:
          #   align: top_mid
          #   y: 8
          #   text: "Home Environment Monitor"
          #   text_font: montserrat_14
          #   text_color: 0xb0c4de

        # ── Leas Ecke row ────────────────────────────────────────────────────
        - obj:
            x: 0
            y: 30
            width: 320
            height: 66
            bg_color: 0x1b3a5c
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 5
                  y: 26
                  width: 83
                  text: "Leas Ecke"
                  text_font: montserrat_12
                  text_color: 0x90caf9
              - label:
                  id: lbl_lea_temp
                  x: 88
                  y: 18
                  width: 110
                  text_align: center
                  text: "--°"
                  text_font: montserrat_28
                  text_color: 0xff8a65
              - label:
                  id: lbl_lea_humid
                  x: 198
                  y: 22
                  width: 82
                  text_align: center
                  text: "--%"
                  text_font: montserrat_20
                  text_color: 0x4fc3f7
                  #  

        # ── Simons Ecke row ──────────────────────────────────────────────────
        - obj:
            x: 0
            y: 98
            width: 320
            height: 66
            bg_color: 0x122d4b
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
