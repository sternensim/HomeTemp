# ESPHome Configuration — Central Display Station
# Hardware: TENSTAR ESP32-2432S028R ("Cheap Yellow Display" / CYD)
#   MCU:       ESP32-WROOM-32
#   Display:   ILI9341  240×320 TFT, SPI (HSPI bus)
#   Touch:     XPT2046  resistive, separate SPI bus
#   Backlight: GPIO21 (PWM via LEDC, active HIGH)
#   RGB LED:   R=GPIO4, G=GPIO16, B=GPIO17 (active-LOW)
#
# Wiring (fixed on board):
#   Display SPI:  CLK=GPIO14  MOSI=GPIO13  MISO=GPIO12
#                 CS=GPIO15   DC=GPIO2     BL=GPIO21
#   Touch SPI:    CLK=GPIO25  MOSI=GPIO32  MISO=GPIO39
#                 CS=GPIO33   IRQ=GPIO36
#
# ⚠ GPIO12/GPIO15/GPIO2 are strapping pins — ESPHome warnings are expected and safe.
#   These are fixed PCB traces on the CYD board, not external resistors.
#
# Entity IDs — verify in HA → Developer Tools → States before flashing.

# ── Core ────────────────────────────────────────────────────────────────────

esphome:
  name: display-station
  friendly_name: Display Station

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Connectivity ─────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Display-Station-AP"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lvgl.label.update:
        id: lbl_footer
        text: "Connected to Home Assistant"
        text_color: 0x66bb6a
  on_client_disconnected:
    - lvgl.label.update:
        id: lbl_footer
        text: "Disconnected from Home Assistant"
        text_color: 0xef5350

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ── SPI buses ─────────────────────────────────────────────────────────────────
# CYD uses two independent SPI buses — display and touch cannot be shared.

spi:
  - id: display_spi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# ── Backlight ─────────────────────────────────────────────────────────────────

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ── ILI9341 display ───────────────────────────────────────────────────────────
# rotation: 90 → ILI9341 driver outputs 320×240 landscape directly.
# LVGL needs no additional rotation.

display:
  - platform: ili9xxx
    model: ILI9341
    id: my_display
    spi_id: display_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    rotation: 0
    update_interval: never   # LVGL owns all redraws
    invert_colors: false     # correct for ILI9341; change to true if colors look negative

# ── XPT2046 resistive touch ───────────────────────────────────────────────────
# Calibration: enable DEBUG logging, press all four corners, note raw x/y values.

touchscreen:
  - platform: xpt2046
    id: my_touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3900
      y_min: 200
      y_max: 3900
    transform:
      swap_xy: true   # required when display is rotated 90°

# ── Home Assistant sensors ────────────────────────────────────────────────────

sensor:

  # Leas Ecke
  - platform: homeassistant
    id: lea_temp
    entity_id: sensor.lea_schreibtisch_node_lea_schreibtisch_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_lea_temp
          text: !lambda 'return str_sprintf("%.1f°", x);'

  - platform: homeassistant
    id: lea_humid
    entity_id: sensor.lea_schreibtisch_node_lea_schreibtisch_humidity
    on_value:
      - lvgl.label.update:
          id: lbl_lea_humid
          text: !lambda 'return str_sprintf("%.0f%%", x);'

  # Simons Ecke
  - platform: homeassistant
    id: sim_temp
    entity_id: sensor.simon_schreibtisch_node_simon_schreibtisch_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_sim_temp
          text: !lambda 'return str_sprintf("%.1f°", x);'

  - platform: homeassistant
    id: sim_humid
    entity_id: sensor.simon_schreibtisch_node_simon_schreibtisch_humidity
    on_value:
      - lvgl.label.update:
          id: lbl_sim_humid
          text: !lambda 'return str_sprintf("%.0f%%", x);'

  # Office
  - platform: homeassistant
    id: of_temp
    entity_id: sensor.room_node_3_office_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_of_temp
          text: !lambda 'return str_sprintf("%.1f°", x);'

  - platform: homeassistant
    id: of_humid
    entity_id: sensor.room_node_3_office_humidity
    on_value:
      - lvgl.label.update:
          id: lbl_of_humid
          text: !lambda 'return str_sprintf("%.0f%%", x);'

  - platform: homeassistant
    id: of_iaq
    entity_id: sensor.room_node_3_office_iaq_score
    on_value:
      - lvgl.label.update:
          id: lbl_of_iaq
          text: !lambda 'return str_sprintf("IAQ %.0f", x);'

  # Station health
  - platform: wifi_signal
    name: "Display Station WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Display Station Uptime"
    update_interval: 60s

button:
  - platform: restart
    name: "Display Station Restart"

# ── LVGL UI ───────────────────────────────────────────────────────────────────
#
# Screen: 320×240 landscape (display rotation: 90 — ILI9341 driver handles orientation)
#
#  ┌──────────────────────────────────────────┐  y=0
#  │        Home Environment Monitor          │  h=30  header
#  ├────────────┬──────────────┬──────────────┤  y=30
#  │ Leas Ecke  │   24.5°      │    45%       │  h=66
#  ├────────────┼──────────────┼──────────────┤  y=98
#  │ Simons Eck │   22.1°      │    52%       │  h=66
#  ├────────────┼──────────────┼──────┬───────┤  y=166
#  │ Office     │   23.8°      │  48% │ IAQ62 │  h=60
#  ├──────────────────────────────────────────┤  y=228
#  │           [HA connection status]         │  h=12  footer
#  └──────────────────────────────────────────┘  y=240
#
#  Column x positions:
#    Room label : x=5,  w=83
#    Temperature: x=88, w=110  (Office: w=90)
#    Humidity   : x=198, w=82  (Office: x=178, w=80)
#    IAQ        : x=258, w=62  (Office only)
# test

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touch
  default_font: montserrat_14

  pages:
    - id: page_main
      bg_color: 0x0d1b2a
      pad_all: 0

      widgets:

        # ── Header ───────────────────────────────────────────────────────────
        - label:
            align: top_mid
            y: 8
            text: "Home Environment Monitor"
            text_font: montserrat_14
            text_color: 0xb0c4de

        # ── Leas Ecke row ────────────────────────────────────────────────────
        - obj:
            x: 0
            y: 30
            width: 320
            height: 66
            bg_color: 0x1b3a5c
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 5
                  y: 26
                  width: 83
                  text: "Leas Ecke"
                  text_font: montserrat_12
                  text_color: 0x90caf9
              - label:
                  id: lbl_lea_temp
                  x: 88
                  y: 18
                  width: 110
                  text_align: center
                  text: "--.-°"
                  text_font: montserrat_28
                  text_color: 0xff8a65
              - label:
                  id: lbl_lea_humid
                  x: 198
                  y: 22
                  width: 82
                  text_align: center
                  text: "--%"
                  text_font: montserrat_20
                  text_color: 0x4fc3f7

        # ── Simons Ecke row ──────────────────────────────────────────────────
        - obj:
            x: 0
            y: 98
            width: 320
            height: 66
            bg_color: 0x122d4b
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 5
                  y: 26
                  width: 83
                  text: "Simons Ecke"
                  text_font: montserrat_12
                  text_color: 0x90caf9
              - label:
                  id: lbl_sim_temp
                  x: 88
                  y: 18
                  width: 110
                  text_align: center
                  text: "--.-°"
                  text_font: montserrat_28
                  text_color: 0xff8a65
              - label:
                  id: lbl_sim_humid
                  x: 198
                  y: 22
                  width: 82
                  text_align: center
                  text: "--%"
                  text_font: montserrat_20
                  text_color: 0x4fc3f7

        # ── Office row (+ IAQ column) ─────────────────────────────────────────
        - obj:
            x: 0
            y: 166
            width: 320
            height: 60
            bg_color: 0x0e2538
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 5
                  y: 23
                  width: 83
                  text: "Office"
                  text_font: montserrat_12
                  text_color: 0x90caf9
              - label:
                  id: lbl_of_temp
                  x: 88
                  y: 15
                  width: 90
                  text_align: center
                  text: "--.-°"
                  text_font: montserrat_28
                  text_color: 0xff8a65
              - label:
                  id: lbl_of_humid
                  x: 178
                  y: 19
                  width: 80
                  text_align: center
                  text: "--%"
                  text_font: montserrat_20
                  text_color: 0x4fc3f7
              - label:
                  id: lbl_of_iaq
                  x: 258
                  y: 23
                  width: 62
                  text_align: center
                  text: "IAQ --"
                  text_font: montserrat_14
                  text_color: 0xa8d8a8

        # ── Footer ───────────────────────────────────────────────────────────
        - label:
            id: lbl_footer
            x: 0
            y: 228
            width: 320
            text_align: center
            text: "Connecting to Home Assistant..."
            text_font: montserrat_10
            text_color: 0x607d8b
