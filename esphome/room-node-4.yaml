# ESPHome Configuration — Room Node 4 (Office)
# Hardware: ESP32 + BME680 + ENS160 + SSD1306 OLED + TP4056 charging
# ENS160 handles eCO2/TVOC/AQI (purpose-built), BME680 handles temp/humidity/pressure/IAQ
# Update interval: 5 minutes (sleep 5min, awake 30s for WiFi + sensors)

esphome:
  name: office
  friendly_name: Office
  on_boot:
    priority: 800
    then:
      - output.turn_on: ntc_power

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi connectivity
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback AP if WiFi connection fails
  ap:
    ssid: "ESPHome-Node-4-Fallback"
    password: "esphome123"

captive_portal:

# Native Home Assistant API
api:
  encryption:
    key: !secret api_key

# Over-the-air firmware updates
ota:
  - platform: esphome
    password: !secret ota_password

# Logging
logger:
  level: INFO

# I2C bus for BME680 + ENS160 + OLED (GPIO21=SDA, GPIO22=SCL)
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

# BME680 environmental sensor (temp, humidity, pressure, IAQ)
bme680_bsec:
  address: 0x77
  temperature_offset: 2.0
  iaq_mode: static
  state_save_interval: 6h
  supply_voltage: 3.3V

# Sensor definitions
sensor:
  - platform: bme680_bsec
    temperature:
      name: "Office Temperature"
      id: temp
      accuracy_decimals: 1
      filters:
        - offset: 0.0
    pressure:
      name: "Office Pressure"
      id: press
      accuracy_decimals: 1
    humidity:
      name: "Office Humidity"
      id: humid
      accuracy_decimals: 1
    gas_resistance:
      name: "Office Gas Resistance"
      id: gas_res
    iaq:
      name: "Office IAQ Score"
      id: iaq
      accuracy_decimals: 0

  # ENS160 air quality sensor (eCO2, TVOC, AQI)
  # I2C address: 0x53 (default) — no conflict with BME680 (0x77) or OLED (0x3C)
  # Compensated with BME680 temperature and humidity for better accuracy
  - platform: ens160
    address: 0x53
    eco2:
      name: "Office eCO2"
      id: eco2
      accuracy_decimals: 0
    tvoc:
      name: "Office TVOC"
      id: tvoc
      accuracy_decimals: 0
    aqi:
      name: "Office AQI"
      id: aqi
    compensation:
      temperature: temp
      humidity: humid
    update_interval: 60s

  # LiPo temperature — NTC thermistor (white wire) on GPIO35
  # Wiring: GPIO27 → 10kΩ fixed resistor → GPIO35 → white wire (NTC inside LiPo → GND)
  # GPIO27 powers the divider — floats during deep sleep to save ~165 µA
  - platform: adc
    pin: GPIO35
    id: battery_temp_adc
    update_interval: 60s
    attenuation: 11db
    internal: true

  - platform: resistance
    id: battery_temp_resistance
    sensor: battery_temp_adc
    configuration: DOWNSTREAM       # NTC is between GPIO35 and GND
    resistor: 10000                  # 10kΩ fixed pull-up resistor (ohms)
    reference_voltage: 3.3V
    internal: true

  - platform: ntc
    sensor: battery_temp_resistance
    name: "Office Battery Temperature"
    id: battery_temp
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    calibration:
      b_constant: 3950              # adjust to 3435 if readings are off
      reference_temperature: 25°C
      reference_resistance: 10000  # NTC nominal resistance at 25°C (ohms)

  # Battery voltage via voltage divider on GPIO34 (100kΩ + 100kΩ, multiply x2)
  # Median filter removed — deep sleep means only 1 sample per wake cycle
  - platform: adc
    pin: GPIO34
    name: "Office Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: 11db
    filters:
      - multiply: 2.0              # compensate for 1:1 voltage divider
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement

  # Battery percentage derived from voltage (3.0V=0%, 4.2V=100%)
  - platform: template
    name: "Office Battery"
    id: battery_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    lambda: |-
      float v = id(battery_voltage).state;
      if (v >= 4.2) return 100.0;
      if (v <= 3.0) return 0.0;
      return (v - 3.0) / 1.2 * 100.0;
    update_interval: 60s

  # WiFi signal strength
  - platform: wifi_signal
    name: "Office Node WiFi Signal"
    update_interval: 60s

  # Uptime tracker
  - platform: uptime
    name: "Office Node Uptime"

# Text sensor for IAQ classification
text_sensor:
  - platform: bme680_bsec
    iaq_accuracy:
      name: "Office IAQ Accuracy"

# OLED display (SSD1306, 128x64 pixels)
# bpp: 1 — SSD1306 is monochrome, bpp:4 causes render errors
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
    bpp: 1
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
    bpp: 1
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
    bpp: 1

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 0
    update_interval: 5s
    brightness: 100%
    lambda: |-
      // Title + battery %
      it.printf(0, 0, id(font_medium), "Office");
      it.printf(90, 4, id(font_small), "%.0f%%", id(battery_pct).state);

      // Temperature and Humidity on one line
      it.printf(0, 20, id(font_small), "%.1f°C  %.0f%%", id(temp).state, id(humid).state);

      // IAQ Score with text label
      int iaq_val = (int)id(iaq).state;
      const char *iaq_label;
      if (iaq_val < 50) {
        iaq_label = "Good";
      } else if (iaq_val < 100) {
        iaq_label = "OK";
      } else if (iaq_val < 200) {
        iaq_label = "Bad";
      } else {
        iaq_label = "Poor";
      }
      it.printf(0, 34, id(font_small), "IAQ: %.0f %s", id(iaq).state, iaq_label);

      // ENS160 eCO2 + TVOC
      it.printf(0, 48, id(font_small), "CO2:%dppm TVOC:%d", (int)id(eco2).state, (int)id(tvoc).state);

# Deep sleep configuration
# 30s awake (WiFi connect + sensor read + OLED update)
# 5min sleep between readings
# deep_sleep:              # PATCHED OUT FOR DEBUGGING
#   run_duration: 30s
#   sleep_duration: 5min
#   id: deep_sleep_control
#   on_sleep:
#     - output.turn_off: ntc_power
#     - display.turn_off: oled_display

# Button to prevent sleep (useful for debugging)
button:
  - platform: restart
    name: "Office Node Restart"
  # - platform: template      # PATCHED OUT FOR DEBUGGING (deep_sleep disabled)
  #   name: "Office Node Force Wake"
  #   on_press:
  #     - deep_sleep.prevent: deep_sleep_control

# GPIO output to power NTC divider (off during deep sleep)
output:
  - platform: gpio
    pin: GPIO27
    id: ntc_power

# Status LED — GPIO16 is safe; GPIO2 is a strapping pin
status_led:
  pin:
    number: GPIO16
    inverted: false
